networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myBackendX
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "
        php artisan --verbose migrate &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # 🕒 SERVICE SCHEDULER - Gestion automatique des tâches planifiées
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mySchedulerX
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - app
    networks:
      - backend
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "
        echo '🕒 Scheduler démarré - Vérification des tâches planifiées toutes les minutes' &&
        while true; do
          php artisan schedule:run --verbose &&
          sleep 60
        done
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myFrontendX
    ports:
      - 5173:80
    networks:
      - backend
      - frontend
    env_file:
      - .env

  db:
    image: postgres:17
    ports:
      - 5433:5432
    volumes:
      - campcameleonx_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend
    container_name: myPostgresX
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🗄️ PGADMIN - Interface web pour PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: myPgAdminX
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@campcameleonx.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - campcameleonx_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - backend
    restart: unless-stopped

  # MAILHOG - Capture des emails en développement
  mailhog:
    image: mailhog/mailhog
    container_name: myMailhogX
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web
    networks:
      - backend
    restart: unless-stopped

volumes:
  campcameleonx_postgres_data:
    driver: local
  campcameleonx_pgadmin_data:
    driver: local