networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myBackendX
    ports:
      - 8000:8000
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "
        php artisan --verbose migrate &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # 🆕 SERVICE SCHEDULER - Gestion automatique des tâches planifiées
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mySchedulerX
    volumes:
      - .:/app
    depends_on:
      - db
      - app
    networks:
      - backend
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "
        echo '🕒 Scheduler démarré - Vérification des tâches planifiées toutes les minutes' &&
        while true; do
          php artisan schedule:run --verbose &&
          sleep 60
        done
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myFrontendX
    ports:
      - 5173:80
    networks:
      - backend
      - frontend
    # env_file:
    #   - .env

  db:
    image: postgres:17
    ports:
      - 5433:5432
    volumes:
      - campcameleonx_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend
    container_name: myPostgresX
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  campcameleonx_postgres_data:
    driver: local